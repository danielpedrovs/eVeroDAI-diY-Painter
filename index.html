<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI DIY Painter Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="chat-container">

<header>

<h1>DIY Painter AI Assistant</h1>

<p>
Ask questions about painting problems like cracks, peeling paint, or repainting walls.
</p>

</header>

<div id="chat-box" class="chat-box">

<div class="message bot">

<p>
Hello 👋 I am your DIY Painter Assistant.
</p>

<p>
Describe your wall problem and I will suggest materials, steps and paint estimates.
</p>

</div>

</div>

<div class="input-area">

<label for="user-input">Your question</label>

<br>

<input
type="text"
id="user-input"
placeholder="Example: My wall has a crack and I want to repaint it"

>

<br><br>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script src="problems.js"></script>

<script src="app.js"></script>

</body>

</html>
